name: nutrigenius
description: An intelligent mobile application for monitoring and preventing child stunting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # State Management
  flutter_bloc: ^8.0.0
  equatable: ^2.0.3
  
  # Network & API
  dio: ^4.0.6
  json_annotation: ^4.4.0
  
  # Local Storage
  shared_preferences: ^2.0.15
  sqflite: ^2.0.2
  path_provider: ^2.0.11
  
  # UI Components
  google_fonts: ^3.0.1
  flutter_svg: ^1.0.3
  cached_network_image: ^3.2.0
  
  # Camera & Image Processing
  camera: ^0.9.4+5
  image_picker: ^0.8.5
  image: ^3.1.3
  
  # ML
  tflite_flutter: ^0.9.0
  
  # Utils
  intl: ^0.17.0
  logger: ^1.1.0
  permission_handler: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.1.7
  json_serializable: ^6.1.4
  mockito: ^5.1.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/ml_models/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700 